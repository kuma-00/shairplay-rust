name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  commit-convention:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate PR title and every commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Same Conventional Commits grammar as .githooks/commit-msg.
          pattern='^(feat|fix|refactor|docs|test|ci|chore|perf|style|build|revert)(\(.+\))?!?: .+'
          fail=0
          if ! printf '%s' "$PR_TITLE" | grep -qE "$pattern"; then
            echo "::error::PR title is not a Conventional Commit: $PR_TITLE"
            fail=1
          fi
          while IFS= read -r sha; do
            [ -z "$sha" ] && continue
            msg=$(git log -1 --format=%s "$sha")
            printf '%s' "$msg" | grep -qE '^(Merge |Revert )' && continue
            if ! printf '%s' "$msg" | grep -qE "$pattern"; then
              echo "::error::Commit ${sha:0:8} is not a Conventional Commit: $msg"
              fail=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$fail" -ne 0 ]; then
            echo "Format: <type>(<scope>): <description>  — types: feat, fix, refactor, docs, test, ci, chore, perf, style, build, revert (optionally '!' for breaking)."
            exit 1
          fi

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build (default)
        run: cargo build
      - name: Build (ap2)
        run: cargo build --features ap2
      - name: Build (video)
        run: cargo build --features video
      - name: Build (hls)
        run: cargo build --features hls
      - name: Test (default)
        run: cargo test
      - name: Test (ap2)
        run: cargo test --features ap2
      - name: Test (video)
        run: cargo test --features video
      - name: Test (hls)
        run: cargo test --features hls

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ALSA (Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - run: cargo clippy --all-features --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features --lib

  cross-check:
    name: Cross Check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, x86_64-pc-windows-gnu]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --target ${{ matrix.target }} --all-features --lib

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
